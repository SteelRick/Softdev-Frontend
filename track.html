<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I SOM CPU - คิวงานปัจจุบัน</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-container">
    
    <div class="top-header">
        <div>
            <h1>I SOM CPU</h1>
            <p>isomcpu.repair.net</p>
        </div>
        <i class="fa-solid fa-xmark fs-3 text-secondary"></i>
    </div>

    <div class="welcome-banner p-0">  
        <div class="user-info-box">
            <img src="https://placehold.co/100x100?text=Profile" alt="Profile" class="profile-pic">
            <div class="welcome-text">
                <h2>ยินดีต้อนรับ</h2>
                <h3>- Nutt -</h3>
            </div>
        </div>
        <div class="welcome-instruction pe-3">ติดตามสถานะ</div>
    </div>

    <div class="form-container flex-grow-1">
        
        <h5 class="queue-tag fw-bold mb-4">
            <i class="fa-solid fa-address-book me-2 text-primary"></i>คิวงาน :
        </h5>
        <div class="timeline-container" id="timelineBox">
            </div>
        <button class="btn btn-outline-primary w-100 mt-3 mb-2" onclick="simulateNextStep()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> จำลองช่างอัปเดตสถานะ
        </button>

    </div>

    <div class="form-container">
        <div class="row g-3">

            <div class="modal-bottom">
                <hr class="linetrack">
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-solid fa-user"></i></div>
                    <span id="modalName">...</span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-solid fa-phone"></i></div>
                    <span id="modalPhone">...</span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2 align-self-start mt-1"><i class="fa-solid fa-location-dot"></i></div>
                    <span id="modalAddress">...</span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-solid fa-laptop"></i></div>
                    <span id="modalDevice">...</span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-solid fa-circle-question"></i></div>
                    <span id="modalProblem">...</span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-regular fa-calendar"></i></div>
                    <span>วันนัดรับเครื่อง: <span id="modalDate">...</span></span>
                </div>
                <div class="confirm-data-row">
                    <div class="icon-circle me-2"><i class="fa-regular fa-clock"></i></div>
                    <span>ช่วงเวลา: <span id="modalTime">...</span></span>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="track.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
